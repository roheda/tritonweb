<md-dialog class="modal" id="galeria">
	<form ng-cloak>
        <md-toolbar class="modal-toolbar">
            <div class="md-toolbar-tools">
                <h2 style="color: #fff;">Desarrollos</h2>
            </div>
        </md-toolbar>
        <md-dialog-content class="p">
            <div class="md-dialog-content">
				<div layout-wrap layout="row" layout-align="center center">
					<div flex="100" layout-padding class="title_modal">
						<small>Llena todos los campos. <span class="small">(Campos obligatorios * )</span></small>
					</div>
		            <div flex="100" layout-padding>
		              	<label class="label" for="titulo">Descripción</label><br/>
		              	<input class="input" id="titulo" type="text" name="titulo" ng-model="objectGaleria.titulo">
		            </div>
		            <div flex="100" layout-padding>
		              	<input class="input-file" ng-file-select="onFileSelect($files)" multiple accept="file/*" type="file">
		            </div>
		            <div flex="100" layout-padding>
		            	<label class="label" for="titulo">Imagenes Seleccionadas</label><br/>
		              	<table rules="rows" cellspacing="0" class="docs">
	                        <thead>
	                            <tr>
	                                <th class="definedWidth text-center">Imagen</th>
	                                <th class="text-left">Descripción</th>
	                                <th class="definedWidth text-center">Eliminar</th>
	                            </tr>
	                        </thead>
	                    </table>
		            	<div class="contImages">
			              	<table rules="rows" cellspacing="0" class="docs">
		                        <tbody>
		                            <tr ng-repeat="item in files">
		                            	<td class="definedWidth text-center"><img src="{{item.ruta}}" alt=""></td>
		                                <td class="text-left">
		              						<input class="input" id="descripcion" type="text" name="descripcion" ng-model="item.descripcion">
		                                </td>
		                                <td class="definedWidth text-center">
		                                	<div ng-click="deleteDocument($index, item)" class="cancelar"><img src="../administrador/images/icons/incorrecto.png" alt="" style="width: 15px !important"></div>
		                                </td>
		                            </tr>
		                        </tbody>
		                    </table>
		                </div>
		            </div>
	            </div>
			</div>
        </md-dialog-content>
        <md-dialog-actions class="p" layout="row" layout-align="end center" style="order: 2;">
			<md-button ng-disabled="disabled" class="md-raised button new" ng-if="!updating" ng-click="save(objectGaleria)">Guardar</md-button>
			<md-button ng-disabled="disabled" class="md-raised button new" ng-if="updating" ng-click="update(objectGaleria)">Editar</md-button>
			<md-button class="md-raised button md-warn" ng-click="cancel()">Cancelar</md-button>
		</md-dialog-actions>
    </form>
</md-dialog>
