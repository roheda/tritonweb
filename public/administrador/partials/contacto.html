<div class="contacto">	
	<div layout-wrap layout="row">
		<div flex="100" layout-padding>
			<md-button class="md-raised button refresh" ng-click="getDataGrid()">Refrescar Datos</md-button>
		</div>
	</div>
	<div layout-wrap layout="row">
		<div flex="100" layout-padding>
			<div layout="row" layout-align="end center">
				<input class="buscar" type="text" placeholder="Buscar" ng-model="search">
			</div>
		</div>
		<div flex="100" layout-padding>
			<table class="grid" rules="rows" cellspacing="0">
				<thead>
					<tr>
						<td class="ordenar" ng-click="ordenar('nombre')">Nombre</td>
						<td class="ordenar" ng-click="ordenar('is_broker')">Broker</td>
						<td class="ordenar" ng-click="ordenar('ciudad')">Ciudad</td>
						<td class="ordenar" ng-click="ordenar('pais')">País</td>
						<td class="ordenar" ng-click="ordenar('correo')">Correo Electrónico</td>
						<td class="ordenar" ng-click="ordenar('telefono')">Teléfono</td>
						<td class="ordenar" ng-click="ordenar('medio')">Medio</td>
						<td class="ordenar" ng-click="ordenar('preferencia')">Preferencia</td>
						<td class="ordenar" ng-click="ordenar('mensaje')">Mensaje</td>
						<td class="text-center acciones small">Acciones</td>
					</tr>
				</thead>
				<tbody>
					<tr ng-repeat="elem in grid | filter: search | orderBy: campo:orden">
						<td>{{elem.nombre}} {{elem.apellido}}</td>
						<td>{{(elem.is_broker == 1) ? 'Si' : 'No'}}</td>
						<td>{{elem.ciudad}}</td>
						<td>{{elem.pais}}</td>
						<td>{{elem.correo}}</td>
						<td>{{elem.telefono}}</td>
						<td>{{elem.medio}}</td>
						<td>{{elem.preferencia}}</td>
						<td>{{elem.mensaje}}</td>
						<td class="text-center acciones">
							<div layout="row" layout="row" layout-align="center center">
								<span class="icono borrar" ng-click="deleteRegister($event, elem)"></span>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>	
</div>
